version: 2

updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - automated
    groups:
      production:
        patterns:
          - "sqlalchemy*"
          - "alembic*"
          - "psycopg*"
      dev:
        patterns:
          - "pytest*"
          - "mypy*"
          - "ruff*"
          - "testcontainers*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
      - automated
