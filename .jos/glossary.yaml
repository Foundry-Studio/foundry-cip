  # ── META / ENG / DOC Layers — Nouns ──────────────────────────

  - term_id: holon
    canonical_name: "Holon"
    short_definition: "A component that is simultaneously a part and a whole."
    definition: >
      A component that is simultaneously a part and a whole. The fundamental
      unit of a holarchy. Every holon has autonomy at its own level and is
      subordinate to the level above.
    concept_scheme: jos-governance
    term_type: structural_concept
    axis: both
    status: draft

  - term_id: holarchy
    canonical_name: "Holarchy"
    short_definition: "A hierarchy of holons forming a recursive tree structure."
    definition: >
      A hierarchy of holons. The recursive tree structure used by both IS and
      HAPPENS axes. Each level contains holons that are wholes to the level
      below and parts to the level above.
    concept_scheme: jos-governance
    term_type: structural_concept
    axis: both
    status: draft

  - term_id: domain
    canonical_name: "Domain"
    short_definition: "A functional area of a venture at L1 within the Venture Lens."
    definition: >
      A functional area of a venture (Meta, Engineering, Documentation, etc.)
      at L1 within the Venture Lens. Domains partition the venture into
      governable regions.
    concept_scheme: jos-governance
    term_type: structural_concept
    axis: both
    status: approved
    scope_note: "Level numbers are relative to the current lens anchor per JOS-FW-001 §2-§4."
    references: [JOS-FW-001]

