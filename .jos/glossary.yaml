  - term_id: prototype
    canonical_name: "Prototype"
    short_definition: "A functional but incomplete version built to test assumptions."
    definition: >
      A functional but incomplete version of something, built to test
      assumptions before committing to full implementation. Prototypes
      are disposable by design.
    concept_scheme: foundry-ventures
    term_type: structural_concept
    axis: thing
    status: draft

  - term_id: framework-governance
    canonical_name: "Framework (Governance)"
    short_definition: "A mental model or structural approach for seeing and organizing a domain."
    definition: >
      A mental model or structural approach for seeing and organizing a
      domain. Describes HOW to think about something, not the data
      structure itself. Distinct from framework (engineering).
    concept_scheme: jos-governance
    term_type: structural_concept
    axis: thing
    status: draft
    scope_note: "This is the governance-layer sense of framework — a mental model. For the engineering sense (opinionated code library), see framework."

  - term_id: architecture
    canonical_name: "Architecture"
    short_definition: "The structural design of how components are organized, connected, and deployed."
    definition: >
      The structural design of how components are organized, connected, and
      deployed. Distinct from framework (mental model) and schema (data
      structure).
    concept_scheme: jos-governance
    term_type: structural_concept
    axis: thing
    status: draft

  - term_id: standard-view
    canonical_name: "Standard View"
    short_definition: "A pre-built, canonical lens configuration for common navigation patterns."
    definition: >
      A pre-built, canonical lens configuration that handles common
      navigation patterns. Standard views are discoverable by default
      and provide consistent entry points into the holonic tree.
    concept_scheme: jos-governance
    term_type: structural_concept
    axis: thing
    status: draft

  - term_id: lens
    canonical_name: "Lens"
    short_definition: "A bounded window into the holonic tree, anchored at a specific node, showing L0-L3 below it."
    definition: >
      A bounded view into the holonic tree created by choosing an anchor
      node (which becomes L0) and seeing its children down to L3. Lenses
      are the primary navigation mechanism — they determine what you see,
      at what depth, for what audience and thinking mode. Any node can be
      an anchor, making lenses unlimited. Standard lenses are pre-built
      and discoverable; ad-hoc lenses are created on demand.
    concept_scheme: jos-governance
    term_type: structural_concept
    axis: both
    status: draft
    related_terms: [standard-view, qualification, cross-domain-trace]
    references: [JOS-FW-001]

  - term_id: qualification
    canonical_name: "Qualification"
    short_definition: "The criteria a candidate must meet to earn a governed status — e.g., a lens becoming standard, a term becoming approved."
    definition: >
      The set of criteria that a candidate entity must satisfy to graduate
      from informal/ad-hoc to governed/standard status. Applied to lenses
      (ad-hoc → standard), glossary terms (draft → approved), components
      (tentative → approved), and any other emergence-path transition.
      Qualification prevents proliferation by requiring demonstrated value
      before granting official standing.
    concept_scheme: jos-governance
    term_type: governance_mechanic
    axis: both
    status: draft
    related_terms: [lens, lifecycle-state, governance]

  # ════════════════════════════════════════════════════════════════
  #  FRAMEWORK TERMS — Added during JOS-FW-001 reconciliation
