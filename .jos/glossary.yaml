    definition: >
      A YAML manifest that references a set of library atoms to form a
      coherent starter kit or reference package. Bundles define which atoms
      are required vs optional, pin atom versions, and declare the bundle's
      scope and context. Ventures adopt bundles (not individual atoms)
      through their charter. Examples: 'E-commerce Starter Kit' bundle,
      'Startup Governance Kit' bundle.
    concept_scheme: jos-governance
    term_type: structural_concept
    axis: thing
    status: approved
    related_terms: [library-atom, library-adoption]

  - term_id: library-adoption
    canonical_name: "Library Adoption"
    short_definition: "The act of a venture forking a library bundle into its own governed space with version pinning."
    definition: >
      When a venture adopts a library bundle, it forks the referenced atoms
      into its own repo as venture-owned content, pinned to a specific bundle
      version. The fork is the venture's copy to customize; the upstream
      library is the reference they can pull updates from. This prevents
      shadow governance — informal standards that everyone follows but
      nobody governs.
    concept_scheme: jos-governance
    term_type: governance_mechanic
    axis: happens
    status: approved
    related_terms: [library-atom, library-bundle]

