  # ── High priority mechanism terms ─────────────────────────────

  - term_id: dual-axis-model
    canonical_name: "Dual-Axis Model"
    short_definition: "The structural backbone: two independent holonic axes (IS/HAPPENS) sharing common root, connected by typed predicates."
    definition: >
      The structural backbone of the holonic venture decomposition: two
      independent holonic axes (IS and HAPPENS) sharing a common root,
      connected by typed cross-axis predicates.
    concept_scheme: jos-governance
    term_type: structural_concept
    axis: both
    status: approved
    references: [JOS-FW-001]
    related_terms: [is-axis, happens-axis, cross-axis-predicate]

  - term_id: is-axis
    canonical_name: "IS Axis"
    short_definition: "The noun axis — what EXISTS in a venture (structure, parts, components)."
    definition: >
      The noun axis of the dual-axis model — what EXISTS in a venture
      (structure, parts, components). Decomposes what a venture IS.
    concept_scheme: jos-governance
    term_type: structural_concept
    axis: thing
    status: approved
    references: [JOS-FW-001]
    broader_term: dual-axis-model

  - term_id: happens-axis
    canonical_name: "HAPPENS Axis"
    short_definition: "The verb axis — what OCCURS in a venture (process, work, events)."
    definition: >
      The verb axis of the dual-axis model — what OCCURS in a venture
      (process, work, events). Decomposes what a venture DOES.
    concept_scheme: jos-governance
    term_type: structural_concept
    axis: action
    status: approved
    references: [JOS-FW-001]
    broader_term: dual-axis-model

  - term_id: meta-component
    canonical_name: "Meta-Component"
    short_definition: "A property applying to any component at any level on either axis. Not a structural level — an attribute visible at every magnification."
    definition: >
      A property applying to any component at any level on either axis.
      Meta-components are not structural levels — they are attributes
      visible at every magnification (e.g., ownership, purpose, stage-label).
    concept_scheme: jos-governance
    term_type: structural_concept
    axis: both
    status: approved
    references: [JOS-FW-001]
    related_terms: [ownership, purpose, stage-label]

  - term_id: boundary-contract
    canonical_name: "Boundary Contract"
    short_definition: "Five-slot declaration interface every governed entity exposes: Identity, Governance, Capability, Interface, Lifecycle. Each slot is elaborated by specific doc-types per JOS-D0054."
    definition: >
      Five-slot declaration interface every governed entity (venture,
      system, subsystem, product, service) exposes. Per JOS-FW-001,
      the five slots answer: Identity (who am I?), Governance (what
      rules apply?), Capability (what can I do?), Interface (how do
      others reach me?), Lifecycle (what stage am I in / where am I
      going?).

      Per JOS-D0054, each slot is *operationally elaborated* by one
      or more file-level doc-types:
      - Identity → PURPOSE.md, README.md, OVERVIEW.md
      - Governance → charter inheritance (no per-thing file)
      - Capability → GUARANTEES.md, HEALTH-STANDARD.md, WDGLL.md
      - Interface → ARCHITECTURE.md
      - Lifecycle → VISION.md, ROADMAP.md, DECISION-LOG.md, CHANGELOG.md

      The Boundary Contract framework is the abstract slot model;
      the doc-types are the concrete operational elaborations.
      Together they form a complete declaration surface.
    concept_scheme: jos-governance
    term_type: governance_mechanic
    axis: both
    status: approved
    references: [JOS-FW-001, JOS-D0054]
    related_terms: [five-contract, identity-contract, governance-contract, capability-contract, interface-contract, lifecycle-contract]

  - term_id: four-layer-identity
    canonical_name: "Four-Layer Identity"
    short_definition: "Addressing scheme: UUID (immutable), Canonical Name (stable human handle), Logical Path (navigable), Physical Location (resolvable)."
    definition: >
      Addressing scheme for governed components: UUID (immutable),
      Canonical Name (stable human handle), Logical Path (navigable),
      Physical Location (resolvable).
    concept_scheme: jos-governance
    term_type: structural_concept
    axis: thing
    status: approved
    references: [JOS-FW-001]

  - term_id: cross-axis-predicate
    canonical_name: "Cross-Axis Predicate"
    short_definition: "Typed relationship connecting IS and HAPPENS axis nodes."
    definition: >
      Typed relationship connecting IS and HAPPENS axis nodes. Seven
      constrained predicates: OPERATES_ON, PRODUCES, CONSUMES,
      TRIGGERED_BY, GOVERNED_BY, MEASURED_BY, PERFORMED_BY.
    concept_scheme: jos-governance
    term_type: relationship
    axis: both
    status: approved
    references: [JOS-FW-001]
    related_terms: [predicate-catalog]

  - term_id: slot-health
    canonical_name: "Slot Health"
    short_definition: "Scoring model for filled slots: five boundary contracts x (State: Met/Partial/Unmet + Trend: Improving/Stable/Declining)."
    definition: >
      Scoring model for filled slots: five boundary contracts scored on
      State (Met/Partial/Unmet) and Trend (Improving/Stable/Declining).
    concept_scheme: jos-governance
    term_type: governance_mechanic
    axis: both
    status: approved
    references: [JOS-FW-001]
    related_terms: [boundary-contract]

  - term_id: slot-state
    canonical_name: "Slot State"
    short_definition: "Three possible states of a template slot: Empty, Null, or Filled."
    definition: >
      Three possible states of a template slot. Empty: not yet considered.
      Null: deliberately not applicable. Filled: active component present.
    concept_scheme: jos-governance
    term_type: lifecycle_state
    axis: thing
    status: approved
    references: [JOS-FW-001]

  - term_id: compliance-outcome-divergence
    canonical_name: "Compliance-Outcome Divergence"
    short_definition: "Four-quadrant immune system comparing contract compliance against actual outcomes."
    definition: >
      Four-quadrant immune system comparing contract compliance against
      actual outcomes, detecting when prescriptions are wrong. Quadrants:
      Met+Good, Met+Bad (false security), Unmet+Good (positive deviance),
      Unmet+Bad (failure).
    concept_scheme: jos-governance
    term_type: governance_mechanic
    axis: both
    status: approved
    references: [JOS-FW-001]

  - term_id: canonical-name
    canonical_name: "Canonical Name"
    short_definition: "Stable human-readable slug for a component, namespace-scoped."
    definition: >
      Stable human-readable slug for a component, namespace-scoped.
      Rarely changes (rename is a governed Minor change). Survives
