  - term_id: contract
    canonical_name: "Contract (Governance)"
    short_definition: "A binary PASS/FAIL mechanical specification that DEMANDS compliance — the machine-checkable subset of governance."
    definition: >
      A governed object (JOS-K## family) that defines exact, binary
      compliance criteria. DIRECTION: demand — flows downward from
      JOS to every governed object. SCALE: fleet-wide — every venture
      inherits all JOS-K## contracts via charter. The differentiation
      test: can a reasonable person (or agent) look at the artifact
      and say definitively YES or NO without interpretation? If yes,
      it belongs in a contract. If it requires taste, judgment, or
      'it depends,' it belongs in a standard or guide instead.
      Contracts apply to ANY domain — technical, operational, brand,
      financial, content — not just code. Examples: frontmatter schema
      compliance (JOS-K01), registry-filesystem sync (JOS-K02), exception
      management (JOS-K07). Contracts default to ALERT mode (notify on
      failure) and can be escalated to BLOCK mode (hard fail) per venture
      charter.

      IMPORTANT — three distinct uses of "contract" in JOS, do not confuse:
      (1) Governance Contract (JOS-K## family, this term) — DEMAND direction,
      fleet-wide compliance constraint. (2) Boundary Contract — the 5-part
      conceptual interface every slot exposes per JOS-FW-001, see term
      `boundary-contract`. (3) Service Guarantees (GUARANTEES.md) — PROMISE
      direction, per-slot commitment to consumers, see term `guarantee`.

      Direction matters: contracts are demands; guarantees are promises.
      Same word in English, opposite meaning here. The naming split is
      deliberate.
    concept_scheme: jos-governance
    term_type: structural_concept
    axis: thing
    status: approved
    broader_term: governed-object
    scope_note: >
      The contract-vs-standard differentiation test is a core JOS principle:
      binary verifiability determines instrument type. This applies both to
      JOS's own governance and to governance that JOS defines for ventures.
      The contract-vs-guarantee distinction is direction (demand vs promise).
    related_terms: [standard, jos-gate, boundary-contract, guarantee, capability-contract]

  - term_id: guarantee
    canonical_name: "Service Guarantee"
    short_definition: "A concrete commitment a thing makes to its consumers — PROMISE direction, opposite of a contract."
    definition: >
      A formal commitment from a producer (subsystem, system, product,
      service) to its consumers (other subsystems, agents, humans, ventures)
      stating "you can count on me to do X." DIRECTION: promise — flows
      outward from the producer to its consumers. SCALE: per-slot —
      scoped to whatever thing is making the promise. Lives in a
      GUARANTEES.md file at the root of the declared thing's directory.
      Each guarantee is numbered (G-01, G-02, ...) and has a status
      (met / partial / not-yet) and an explicit verification mechanism
      (typically a corresponding HEALTH-STANDARD.md check).

      Guarantees elaborate the Capability Contract slot of a Boundary
      Contract (JOS-FW-001's 5-part interface). They are the concrete,
      committed form of "what can I do" for consumers who depend on this
      thing.

      CONTRAST WITH CONTRACTS — the most common confusion:
      A contract DEMANDS compliance ("you must do X to be JOS-governed").
      A guarantee PROMISES capability ("I will do X for you, my consumer").
      Same English word, opposite direction. JOS splits them to make
      the direction visible: JOS-K## are Governance Contracts (demands);
      GUARANTEES.md files are Service Guarantees (promises).

      Foundry's existing CONTRACT.md files (51 instances) are
      semantically GUARANTEES — they list "S-01, S-02, ..." commitments
      to consumers. They will migrate to GUARANTEES.md during the venture
      sweep (post-broadcast).
    concept_scheme: jos-governance
    term_type: structural_concept
    axis: thing
    status: approved
    broader_term: governed-object
    scope_note: >
      Guarantees are paired with executable HEALTH-STANDARD.md checks
      that verify the guarantee is met right now. A guarantee without
      a verification mechanism is aspiration, not commitment.
    related_terms: [contract, boundary-contract, capability-contract, health-standard, service-level-agreement]

  - term_id: library-atom
