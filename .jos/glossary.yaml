      Litigation is governed by strict procedural rules and requires
      coordination with legal counsel.
    concept_scheme: foundry-ventures
    term_type: lifecycle_state
    axis: action
    status: draft

  - term_id: ingest
    canonical_name: "Ingest"
    short_definition: "Bring external data into the venture's systems."
    definition: >
      The process of bringing external data into the venture's systems.
      Ingestion captures raw data and lands it in the appropriate data
      zone for downstream processing.
    concept_scheme: engineering
    term_type: lifecycle_state
    axis: action
    status: draft

  - term_id: transform
    canonical_name: "Transform"
    short_definition: "Clean, normalize, and enrich raw data."
    definition: >
