    concept_scheme: jos-governance
    term_type: structural_concept
    axis: thing
    status: approved
    references: [JOS-FW-001]
    broader_term: four-layer-identity

  - term_id: revision-identity
    canonical_name: "Revision Identity"
    short_definition: "Immutable revision ID (version number or content hash) on every saved state."
    definition: >
