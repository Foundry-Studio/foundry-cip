  # ── Architecture & Framework Terms ───────────────────────────

  - term_id: meta-os
    canonical_name: "Meta-OS"
    short_definition: "An operating system for building and running other operating systems."
    definition: >
      What JOS is — a venture-agnostic operating system that sits above
      individual ventures, providing the standards, frameworks, and
      governance machinery from which venture-specific operating systems
      inherit.
    concept_scheme: jos-governance
    term_type: structural_concept
    axis: thing
    status: approved
    related_terms: [fractal-self-similarity]

  - term_id: dual-axis
    canonical_name: "Dual-Axis Model"
    short_definition: "The IS/HAPPENS classification splitting things from actions."
    definition: >
      JOS's primary classification dimension separating governance
      objects into the IS axis (nouns — what exists as a structural
      entity) and the HAPPENS axis (verbs — what occurs as a process or
      event). Some objects span both axes.
    concept_scheme: jos-governance
    term_type: governance_mechanic
    axis: thing
    status: approved
    references:
      - JOS-D0027
    related_terms: [holonic-decomposition]

  - term_id: holonic-decomposition
    canonical_name: "Holonic Decomposition"
    short_definition: "Recursive breakdown where each part is both whole and part."
    definition: >
      The architectural pattern where every JOS entity is simultaneously
      a complete whole (with its own boundary contracts) and a part of a
      larger whole. Enables fractal self-similarity at every scale —
      domains contain systems contain subsystems, each self-similar.
    concept_scheme: jos-governance
    term_type: structural_concept
    axis: action
    status: approved
    related_terms: [fractal-self-similarity, system, subsystem]

  - term_id: five-contract
    canonical_name: "Five Boundary Contracts"
    short_definition: "The five-slot declaration model every governed entity must satisfy. Per JOS-D0054, each slot is operationally elaborated by specific doc-types."
    definition: >
      The architectural model requiring every governed entity (venture,
      system, subsystem, product, service) to declare five boundary
      contracts: Identity (who am I), Governance (what rules apply),
      Capability (what can I do), Interface (how do others reach me),
      Lifecycle (what stage am I in / where going).

      Per JOS-D0054, each slot is *operationally elaborated* by
      specific file-level doc-types — 10 doc-types map to the 5 slots
      (with Governance covered by charter inheritance rather than a
      per-thing file):
      - Identity → PURPOSE.md + README.md + OVERVIEW.md (3 docs)
      - Governance → charter inheritance (0 file docs)
      - Capability → GUARANTEES.md + HEALTH-STANDARD.md + WDGLL.md (3 docs)
      - Interface → ARCHITECTURE.md (1 doc)
      - Lifecycle → VISION.md + ROADMAP.md + DECISION-LOG.md + CHANGELOG.md (4 docs)

      The Five Boundary Contracts framework is the *abstract slot model*;
      the doc-types are the *concrete operational forms*. Together
      they constitute the JOS Declaration Surface.
    concept_scheme: jos-governance
    term_type: structural_concept
    axis: thing
    status: approved
    references: [JOS-FW-001, JOS-D0054]
    related_terms: [boundary-contract, identity-contract, governance-contract, capability-contract, interface-contract, lifecycle-contract]

  - term_id: identity-contract
    canonical_name: "Identity Contract"
    short_definition: "Boundary contract slot declaring who/what an entity is; elaborated by PURPOSE.md + README.md + OVERVIEW.md per JOS-D0054."
    definition: >
      One of the five boundary contracts. Declares the entity's name,
      purpose, ownership, and position within the governance hierarchy.
      Answers: 'Who am I?'

      Operational elaboration (per JOS-D0054): the Identity slot is
      filled by three doc-types in concert:
      - PURPOSE.md — why this exists (the existential WHY)
      - README.md — entry-level identity + navigation
      - OVERVIEW.md — inventory of what's inside (the WHAT)

      New readers/agents encounter identity through this triad in
      order: why this exists → where to find things → what's there.
    concept_scheme: jos-governance
    term_type: structural_concept
    axis: thing
    status: approved
    broader_term: five-contract
    related_terms: [boundary-contract, purpose-doc, readme-doc, overview-doc]
    references: [JOS-D0054]

  - term_id: governance-contract
    canonical_name: "Governance Contract"
    short_definition: "Boundary contract slot declaring what rules apply to an entity; elaborated by charter inheritance per JOS-D0054 (no per-thing file doc-type)."
    definition: >
      One of the five boundary contracts. Declares which standards,
      rules, contracts, and standing orders the entity is subject to.
      Answers: 'What rules apply to me?'

      Operational elaboration (per JOS-D0054): unlike the other four
      slots, the Governance Contract slot has NO per-thing file
      doc-type. It is elaborated via charter inheritance — each
      venture's `.jos/charter.yaml` projects governance from JOS
      (rules, standing orders, contracts the venture inherits) into
      local-readable form. The charter IS the elaboration.

      A future enhancement could add a per-system GOVERNANCE.md
      summarizing inherited rules — currently deferred (charter is
      sufficient). Not to be confused with `contract` (governance
      contract in the JOS-K## sense — those are binding constraints
      JOS imposes, distinct from this slot's role of declaring which
      apply).
    concept_scheme: jos-governance
    term_type: structural_concept
    axis: thing
    status: approved
    broader_term: five-contract
    related_terms: [boundary-contract, charter, contract]
    references: [JOS-D0054]

  - term_id: capability-contract
    canonical_name: "Capability Contract"
    short_definition: "Boundary contract slot declaring what an entity can do; elaborated by GUARANTEES.md + HEALTH-STANDARD.md + WDGLL.md per JOS-D0054."
    definition: >
      One of the five boundary contracts. Declares the entity's
      features, services, and functional scope. Answers: 'What can I do?'

      Operational elaboration (per JOS-D0054): the Capability slot
      is filled by three doc-types in concert (capability operates
      in three modes):
      - GUARANTEES.md — the FORMAL PROMISE (what consumers can count on,
        per the `guarantee` term)
      - HEALTH-STANDARD.md — the MECHANICAL VERIFICATION (executable
        checks proving the guarantees are met right now)
      - WDGLL.md — the BEHAVIORAL NORM (what humming feels like when
        capability is delivered well)

      Together: promised, verified, recognized. A capability without
      a guarantee is aspiration; a guarantee without verification is
      bullshit; a verified guarantee without behavioral norm is
      brittle. The triad completes capability declaration.

      Direction: Capability Contract is bidirectional declaration
      (here is what I can do, both as exposed and as bounded). The
      Service Guarantees elaborating it are outward-promise direction.
    concept_scheme: jos-governance
    term_type: structural_concept
    axis: thing
    status: approved
    broader_term: five-contract
    related_terms: [boundary-contract, guarantee, health-standard, wdgll]
    references: [JOS-D0054]

  - term_id: interface-contract
    canonical_name: "Interface Contract"
    short_definition: "Boundary contract slot declaring how others interact with an entity; elaborated by ARCHITECTURE.md per JOS-D0054."
    definition: >
      One of the five boundary contracts. Declares the entity's inputs,
      outputs, protocols, and interaction points. Answers: 'How do
      others reach me?'

      Operational elaboration (per JOS-D0054): the Interface slot is
      currently elaborated by ARCHITECTURE.md, which covers both
      build details AND interaction surfaces. A future split could
      pull an explicit INTERFACE.md (or API.md) from ARCHITECTURE if
      the two dimensions become entangled enough to warrant separation.
      For now, ARCHITECTURE covers the slot.
    concept_scheme: jos-governance
    term_type: structural_concept
    axis: thing
    status: approved
    broader_term: five-contract

  - term_id: lifecycle-contract
    canonical_name: "Lifecycle Contract"
    short_definition: "Boundary contract slot declaring an entity's stage and temporal evolution; elaborated by VISION + ROADMAP + DECISION-LOG + CHANGELOG per JOS-D0054."
    definition: >
      One of the five boundary contracts. Declares the entity's
      current lifecycle stage, build maturity, and transition history.
      Answers: 'What stage am I in? Where am I going? How did I get
      here?'

      Operational elaboration (per JOS-D0054): the Lifecycle slot is
      filled by four doc-types spanning four temporal modes:
      - VISION.md — FORWARD direction (where going + solve-for)
      - ROADMAP.md — the PATH (coarse strategic phases to get there)
      - DECISION-LOG.md — BACKWARD record of choices (what got us here)
      - CHANGELOG.md — BACKWARD record of changes (what changed when)

      Together they fully elaborate temporal evolution: past choices,
      past changes, present stage, forward direction, planned path.
    concept_scheme: jos-governance
    term_type: structural_concept
    axis: thing
    status: approved
    broader_term: five-contract
    related_terms: [boundary-contract, vision-doc, roadmap-doc, decision-log-doc, changelog-doc]
    references: [JOS-D0054]

  # ── Governance Mechanics ──────────────────────────────────────

  - term_id: insight-pull
    canonical_name: "Insight Pull"
    short_definition: "Bottom-up pattern for extracting reusable governance from ventures."
    definition: >
      The governed process (SOP-005) for pulling proven patterns from
      individual ventures up into JOS as universally-recommended or
      JOS-adopted objects. The inverse of charter-push. Schema promotes;
      content stays.
    concept_scheme: jos-governance
    term_type: governance_mechanic
    axis: action
    status: approved
    references:
      - JOS-SOP-005
    related_terms: [promote, schema-promotes, charter-sync]

  - term_id: compliance-sweep
    canonical_name: "Compliance Sweep"
    short_definition: "Systematic evaluation of a venture's adherence to its charter."
    definition: >
      A governed operation that evaluates how well a venture (or repo)
      conforms to its declared charter obligations. Produces a
      compliance scorecard with compliant/partial/gap ratings per
      obligation.
    concept_scheme: jos-governance
    term_type: governance_mechanic
    axis: action
    status: approved
    related_terms: [charter-compliance, rubric]

  - term_id: schema-promotes
    canonical_name: "Schema Promotes, Content Stays"
    short_definition: "Core principle: only structural patterns elevate to JOS."
    definition: >
      The governing principle for insight-pull: when a venture produces
      something reusable, the structural schema (shape, fields,
      constraints) promotes to JOS while the venture-specific content
      remains local. JOS never absorbs content — only patterns.
    concept_scheme: jos-governance
    term_type: governance_mechanic
    axis: action
    status: approved
    related_terms: [insight-pull, promote]

  - term_id: structural-truth
    canonical_name: "Structural Truth"
    short_definition: "The registry is the single source of structural truth."
    definition: >
      The principle that the JOS registry (registry.yaml) is the
      authoritative record of what governed objects exist. If something
      isn't registered, it doesn't exist from a governance perspective.
      All discovery surfaces derive from the registry.
    concept_scheme: jos-governance
    term_type: governance_mechanic
    axis: thing
    status: approved
    references:
      - JOS-SO-001
    related_terms: [registry]

  - term_id: component-type
    canonical_name: "Component Type"
    short_definition: "A classification of governed objects by their structural role."
    definition: >
      The formal type assigned to every governed entity in JOS. Each
      component type has a manifest defining required artifacts,
      lifecycle rules, and slot behavior. Defined in
      architecture/component-types/.
    concept_scheme: jos-governance
    term_type: structural_concept
    axis: thing
    status: approved
    related_terms: [manifest, governed-object]

  - term_id: rubric
    canonical_name: "Rubric"
    short_definition: "A scoring framework for evaluating compliance or quality."
    definition: >
      A venture-agnostic assessment instrument that defines what 'good'
      looks like across multiple dimensions, assigns compliant/partial/gap
      scores, and produces a composite quality rating. Reusable across
      ventures, ideas, and clients.
    concept_scheme: jos-governance
    term_type: governance_mechanic
    axis: thing
    status: approved
    related_terms: [compliance-sweep, quality-triad]

  - term_id: data-residency
    canonical_name: "Data Residency"
    short_definition: "Classification of where different types of data should live."
    definition: >
      A governance classification determining which storage layer is
      appropriate for different data categories: Doctrine lives in files,
      State lives in databases, Derived content is generated/projected,
      Deliverables live in venture workspaces.
    concept_scheme: jos-governance
    term_type: governance_mechanic
    axis: thing
    status: approved

  - term_id: window-projection
    canonical_name: "Window (Projection)"
    short_definition: "A derived view of source-of-truth data projected for a specific audience."
    definition: >
      An auto-generated representation of governed data projected into a
      format suitable for a specific consumer. Source files are the truth;
      windows (markdown views, dashboards, scorecards, agent-readable
      indexes) are projections that stay in sync automatically.
    concept_scheme: jos-governance
    term_type: structural_concept
    axis: thing
    status: approved
    related_terms: [data-residency, structural-truth]

  - term_id: charter-push
    canonical_name: "Charter Push"
    short_definition: "Top-down propagation of governance changes to ventures."
    definition: >
      The mechanism by which JOS-level governance changes are propagated
      to venture repos via charter distribution. The inverse of
      insight-pull. Changes flow from JOS to distribution/charters/ to
      venture .jos/charter.yaml.
    concept_scheme: jos-governance
    term_type: governance_mechanic
    axis: action
    status: approved
    related_terms: [charter-sync, insight-pull, cascade]

  - term_id: domain-owner
    canonical_name: "Domain Owner"
    short_definition: "The person accountable for a governance domain's health."
    definition: >
      The human (solid-line authority) responsible for a specific
      governance domain's completeness, currency, and effectiveness.
      Domain owners approve promotions into their domain and resolve
      conflicts.
    concept_scheme: jos-governance
    term_type: governance_mechanic
    axis: thing
    status: approved
    related_terms: [governance-domain, owner, solid-line]

  - term_id: governed-repo
    canonical_name: "Governed Repository"
    short_definition: "A code repository operating under a JOS charter."
    definition: >
      Any repository that has adopted JOS governance via a
      .jos/charter.yaml file. Governed repos consume governance through
      charter-sync and are subject to compliance sweeps.
    concept_scheme: jos-governance
    term_type: structural_concept
    axis: thing
    status: approved
    related_terms: [charter, charter-sync, compliance-sweep]

  # ── Build Maturity States ─────────────────────────────────────

  - term_id: stage-retire
    canonical_name: "Retire (Stage)"
    short_definition: "Terminal stage: object withdrawn from active use."
    definition: >
      The final stage label indicating a governed object has been
      withdrawn from active governance. Retired objects remain in the
      registry for historical reference but are no longer enforced or
      maintained.
    concept_scheme: jos-governance
    term_type: lifecycle_state
    axis: action
    status: approved
    broader_term: stage-label
    related_terms: [stage-rejected, retire]

  - term_id: propose
    canonical_name: "Propose (Build Maturity)"
    short_definition: "Initial build maturity: object exists but lacks required artifacts."
    definition: >
      The first build maturity level indicating a governed object has
      been created but its required documentation, frontmatter, and
      artifacts are incomplete. The object exists conceptually but isn't
      production-ready.
    concept_scheme: jos-governance
    term_type: lifecycle_state
    axis: thing
    status: approved
    broader_term: build-maturity

  - term_id: bronze
    canonical_name: "Bronze (Build Maturity)"
    short_definition: "Minimal build maturity: core artifacts present but gaps remain."
    definition: >
      Build maturity indicating a governed object has its essential
      frontmatter and basic definition, but may lack references,
      relationship mapping, or full compliance with its component type
      manifest.
    concept_scheme: jos-governance
    term_type: lifecycle_state
    axis: thing
    status: approved
    broader_term: build-maturity

  - term_id: silver
    canonical_name: "Silver (Build Maturity)"
    short_definition: "Solid build maturity: all required artifacts present and connected."
    definition: >
      Build maturity indicating a governed object satisfies all required
      fields in its component type manifest, has proper cross-references,
      and is ready for governance use. Most objects target silver as
      operational minimum.
    concept_scheme: jos-governance
    term_type: lifecycle_state
    axis: thing
    status: approved
    broader_term: build-maturity

  - term_id: gold
    canonical_name: "Gold (Build Maturity)"
    short_definition: "Fully mature: complete documentation, tests, and proven in practice."
    definition: >
      The highest build maturity level. Gold objects have complete
      documentation, all optional enrichments, research backing, proven
      track record in at least one venture, and could serve as a
      reference implementation.
    concept_scheme: jos-governance
    term_type: lifecycle_state
    axis: thing
    status: approved
    broader_term: build-maturity

  # ── Quality Triad (CSS/OSS/PSS) ──────────────────────────────

  - term_id: css
    canonical_name: "Component Standard System (CSS)"
    short_definition: "The Definition dimension of the Quality Triad."
    definition: >
      The quality dimension addressing structural correctness — what a
      thing IS. Covers frontmatter completeness, schema compliance,
      registration, and definitional clarity. Maps to Donabedian's
      'Structure' dimension.
    concept_scheme: jos-governance
    term_type: structural_concept
    axis: thing
    status: approved
    related_terms: [quality-triad, triad-definition, oss, pss]

  - term_id: oss
    canonical_name: "Operation Standard System (OSS)"
    short_definition: "The Operation dimension of the Quality Triad."
    definition: >
      The quality dimension addressing process correctness — how a thing
      WORKS. Covers SOPs, workflows, lifecycle transitions, and
      operational mechanics. Maps to Donabedian's 'Process' dimension.
    concept_scheme: jos-governance
    term_type: structural_concept
    axis: thing
    status: approved
    related_terms: [quality-triad, triad-operation, css, pss]

  - term_id: pss
    canonical_name: "Performance Standard System (PSS)"
    short_definition: "The Performance dimension of the Quality Triad."
    definition: >
      The quality dimension addressing outcome correctness — how well a
      thing PERFORMS. Covers metrics, compliance scores, effectiveness
      measures, and actual impact. Maps to Donabedian's 'Outcome'
      dimension.
    concept_scheme: jos-governance
    term_type: structural_concept
    axis: thing
    status: approved
    related_terms: [quality-triad, triad-performance, css, oss]

  - term_id: donabedian
    canonical_name: "Donabedian Model"
    short_definition: "The healthcare quality framework underpinning the Quality Triad."
    definition: >
      Avedis Donabedian's Structure-Process-Outcome quality model
      (1966), adapted for governance as CSS (Definition) / OSS
      (Operation) / PSS (Performance). Provides the theoretical backing
      for JOS's Quality Triad.
    concept_scheme: jos-governance
    term_type: structural_concept
    axis: thing
    status: approved
    related_terms: [quality-triad, css, oss, pss]

  # ── Miscellaneous Important Terms ────────────────────────────

  - term_id: worker-governance
    canonical_name: "Worker (Governance)"
    short_definition: "Any entity — human or agent — performing work within a venture."
    definition: >
      The umbrella term for any actor that performs governed work.
      Workers are either human or agent (AI). JOS governance applies to
      worker onboarding, behavioral standards, and accountability
      regardless of type.
    concept_scheme: jos-governance
    term_type: structural_concept
    axis: thing
    status: approved
    related_terms: [owner, steward, agent-line]
    scope_note: "Disambiguates from engineering 'worker' (job-running process)."

  - term_id: feature-map
    canonical_name: "Feature Map"
    short_definition: "The discoverable index of features provided by a system."
    definition: >
      An artifact within each system/subsystem declaring what features
      that system provides. Constitutes the external discovery surface
      for capabilities. Populated during self-decomposition.
    concept_scheme: jos-governance
    term_type: structural_concept
    axis: thing
    status: approved
    related_terms: [feature, system, discovery-surface]

  - term_id: precedence-hierarchy
    canonical_name: "Precedence Hierarchy"
    short_definition: "The ordering of governance authority from highest to lowest."
    definition: >
      The defined order in which governance objects take priority when
      conflicts arise: Standing Orders > Rules > Standards > Contracts >
      Best Practices > Guides. Higher-precedence objects override lower
      ones.
    concept_scheme: jos-governance
    term_type: governance_mechanic
    axis: thing
    status: approved
    related_terms: [standing-order, rule, standard, contract]

  - term_id: sparse-over-encyclopedic
    canonical_name: "Sparse Over Encyclopedic"
    short_definition: "JOS design principle favoring minimal viable governance."
    definition: >
      The design philosophy that JOS should define the minimum governance
      needed to enable ventures, not the maximum governance possible.
      Ventures are free to add density; JOS stays lean.
    concept_scheme: jos-governance
    term_type: governance_mechanic
    axis: thing
    status: approved
    related_terms: [meta-os, compression-gradient]

  - term_id: machine-readable
    canonical_name: "Machine-Readable"
    short_definition: "Content parseable by automated tools without human intervention."
    definition: >
      A requirement for governed objects: their structural metadata
      (frontmatter, registry entries, relationship types) must be
      parseable by scripts, agents, and tools. Enables automated
      compliance checking, discovery, and projection.
    concept_scheme: jos-governance
    term_type: governance_mechanic
    axis: thing
    status: approved
    related_terms: [human-readable, discovery-surface]

  - term_id: human-readable
    canonical_name: "Human-Readable"
    short_definition: "Content understandable by humans without tooling."
    definition: >
      A requirement for governed objects: their content must be
      accessible and comprehensible to humans reading the raw files.
      Markdown + YAML frontmatter satisfies both human-readable and
      machine-readable requirements simultaneously.
    concept_scheme: jos-governance
    term_type: governance_mechanic
    axis: thing
    status: approved
    related_terms: [machine-readable]

  - term_id: load-bearing
    canonical_name: "Load-Bearing"
    short_definition: "Structurally critical — removal would break dependent systems."
    definition: >
      Descriptor for governance objects, terms, or patterns that other
      objects depend on structurally. Load-bearing elements require extra
      care when modifying — blast radius analysis is mandatory before
      changes.
    concept_scheme: jos-governance
    term_type: governance_mechanic
    axis: thing
    status: approved
    related_terms: [blast-radius, structural-truth]

  - term_id: cross-venture
    canonical_name: "Cross-Venture"
    short_definition: "Spanning or applicable across multiple ventures."
    definition: >
      A visibility/scope classification indicating something applies
      beyond a single venture boundary. Cross-venture concerns are
      typically managed at JOS level or through explicit federation
      mechanisms.
    concept_scheme: jos-governance
    term_type: governance_mechanic
    axis: thing
    status: approved
    related_terms: [venture-specific, jos-adopted]

  - term_id: bottom-up
    canonical_name: "Bottom-Up"
    short_definition: "Direction of governance evolution from ventures toward JOS."
    definition: >
      The direction in which proven patterns flow from individual
      ventures upward into JOS via insight-pull. Contrasts with top-down
      (charter-push). JOS governance evolves in both directions
      simultaneously.
    concept_scheme: jos-governance
    term_type: governance_mechanic
    axis: action
    status: approved
    related_terms: [insight-pull, promote, charter-push]

  - term_id: opt-in
    canonical_name: "Opt-In"
    short_definition: "Voluntary adoption of governance beyond mandatory requirements."
    definition: >
      The pattern where ventures choose to adopt suggested-flexibility
      or framework-flexibility governance objects beyond their charter's
      required minimums. Libraries and best practices are typically
      opt-in.
    concept_scheme: jos-governance
    term_type: governance_mechanic
    axis: action
    status: approved
    related_terms: [flexibility-level, library-adoption]
