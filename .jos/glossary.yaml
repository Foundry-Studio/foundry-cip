  # ── Wave 0.4H Additions ─────────────────────────────────────

  - term_id: system-component
    canonical_name: "System (Component Type)"
    short_definition: "A major functional grouping within a venture's operational structure."
    definition: >
      A major functional grouping within a venture's operational structure
      (e.g., governance-system, registry-system, distribution-system).
      Systems decompose into subsystems. Defined as a JOS structural
      component type in architecture/component-types/. Not to be confused
      with 'system' as a general term.
    concept_scheme: jos-governance
    term_type: component_type
    axis: thing
    status: approved
    related_terms: [subsystem-component, governance-domain]

  - term_id: subsystem-component
    canonical_name: "Subsystem (Component Type)"
    short_definition: "A subdivision of a system, owning a focused slice of that system's function."
    definition: >
      A subdivision of a system, owning a focused slice of that system's
      function (e.g., identity-subsystem within registry-system). Subsystems
      are the leaf-level structural grouping. Defined as a JOS structural
      component type in architecture/component-types/.
    concept_scheme: jos-governance
    term_type: component_type
    axis: thing
    status: approved
    related_terms: [system-component]

  - term_id: compliance-clock
    canonical_name: "Compliance Clock"
    short_definition: "A 90-day grace period after a contract version bump before ventures must comply."
    definition: >
      A 90-day grace period that begins when a JOS contract is versioned
      upward. Ventures pinning the prior version have 90 days to adopt the
      new version or declare a variance. Prevents silent breaking changes
      while keeping the system moving forward. Concept from expert panel
      synthesis (Wave 0.4H).
    concept_scheme: jos-governance
    term_type: governance_mechanic
    axis: action
    status: approved
    related_terms: [contract, charter]

  - term_id: alert-block-enforcement
    canonical_name: "Alert/Block Enforcement"
    short_definition: "Two-tier enforcement model: ALERT (notify, default) or BLOCK (hard fail, opt-in)."
    definition: >
      The two-tier enforcement model for contracts and gates. ALERT mode
      (default) notifies on failure but does not block. BLOCK mode (opt-in)
      prevents progression on failure. Ventures escalate from alert to block
      in their charter when ready. Embodies the 'publishing system, not
      policing system' principle.
    concept_scheme: jos-governance
    term_type: governance_mechanic
    axis: action
    status: approved
    related_terms: [contract, jos-gate, charter]
    scope_note: >
      Charter format: gates: { frontmatter_check: alert, registry_sync: block }.
      All gates and contracts default to alert mode.

  - term_id: 1970-2070-test
    canonical_name: "1970/2070 Test"
    short_definition: "Universality filter: if a practice fails in 1970 or 2070 context, it's too platform-specific for JOS."
    definition: >
      The meta-test JOS applies to every governance object. Would this
      practice make sense to a 1970 mainframe engineer? Would it still make
      sense to a 2070 quantum/AI engineer? If either answer is no, the
      object encodes platform-specific assumptions rather than durable
      governance truth. Formalized as JOS-BP-007.
    concept_scheme: jos-governance
    term_type: governance_mechanic
    axis: action
    status: approved
    related_terms: [best-practice, governed-object]
    references: [JOS-BP-007]

  - term_id: domain-component
    canonical_name: "Domain (Component Type)"
    short_definition: "A governance domain used as a structural component type for organizing objects."
    definition: >
      One of the 9 governance domains (meta, eng, doc, dat, fin, str,
      ops, ppl, leg) used as a structural organizing axis for governance
      objects. Defined as Axis 6 in JOS-D0040. As a component type,
      domains group standards, rules, principles, and other objects
      that share a functional concern.
    concept_scheme: jos-governance
    term_type: component_type
    axis: thing
    status: approved
    related_terms: [governance-domain, system-component]

