      Transformation moves data between zones and applies business
      rules to produce curated datasets.
    concept_scheme: engineering
    term_type: lifecycle_state
    axis: action
    status: draft

  - term_id: classify-data
    canonical_name: "Classify (Data)"
    short_definition: "Label data with sensitivity and regulatory categories."
    definition: >
      The process of labeling data with sensitivity and regulatory
      categories. Data classification drives access controls and
      determines applicable retention policies.
    concept_scheme: foundry-ventures
    term_type: governance_mechanic
    axis: action
    status: draft

  - term_id: archive
    canonical_name: "Archive"
    short_definition: "Move aged data to cold storage per retention policy."
    definition: >
      The process of moving aged data to cold storage per retention policy.
      Archiving reduces active storage costs while preserving data for
      compliance and historical reference.
    concept_scheme: foundry-ventures
    term_type: lifecycle_state
    axis: action
    status: draft

  # ── Tim Brainstorm Session — Additional Terms ────────────────

  - term_id: tentative
