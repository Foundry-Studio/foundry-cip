  - term_id: playbook
    canonical_id: operations:playbook
    canonical_name: "Playbook"
    pref_label: "playbook"
    short_definition: "Human-readable procedure guidance — the judgment-heavy variant of an SOP."
    definition: >
      A judgment-heavy variant of an SOP (operations:sop): a human-readable
      procedure guide that allows situational adaptation rather than
      step-by-step prescription. Like SOPs, playbooks live in Work-Definition
      as data; like SOPs, they instantiate rather than execute. Used when the
      work requires human discretion rather than deterministic choreography.
    scope_note: >
      Work-execution sense only (FAS canon, locked 2026-07-11). Distinct from
