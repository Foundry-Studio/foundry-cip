  - term_id: sop
    canonical_id: operations:sop
    canonical_name: "Standard Operating Procedure (SOP)"
    pref_label: "SOP"
    short_definition: "A cross-actor procedure definition choreographing humans, agents, and code across a multi-step work unit."
    definition: >
      A named, reusable procedure definition stored in Work-Definition (FWD)
      as data. An SOP choreographs humans, agents, and code across a
      multi-step work unit; it never executes directly — it instantiates into
      PM containers and FWE runs across the named actors. SOPs are the
      definition layer; in-process orchestration (graphs, loops) is not their
      job.
    scope_note: >
      Work-execution sense only (FAS canon, locked 2026-07-11). Distinct from
      the JOS governance delivery-instrument SOP (legacy:jos-sop), which is a
      formal document type.
    related_terms: [operations:playbook, operations:instantiated-work, operations:layer-rule]
    status: draft
    axis: IS
    term_type: structural_concept

  - term_id: playbook
    canonical_id: operations:playbook
    canonical_name: "Playbook"
    pref_label: "playbook"
    short_definition: "Human-readable procedure guidance — the judgment-heavy variant of an SOP."
    definition: >
      A judgment-heavy variant of an SOP (operations:sop): a human-readable
      procedure guide that allows situational adaptation rather than
      step-by-step prescription. Like SOPs, playbooks live in Work-Definition
      as data; like SOPs, they instantiate rather than execute. Used when the
      work requires human discretion rather than deterministic choreography.
    scope_note: >
      Work-execution sense only (FAS canon, locked 2026-07-11). Distinct from
      the JOS governance delivery-instrument playbook (legacy:jos-playbook).
    related_terms: [operations:sop, operations:layer-rule]
    status: draft
    axis: IS
    term_type: structural_concept

  - term_id: instantiated-work
    canonical_id: operations:instantiated-work
    canonical_name: "Instantiated Work"
    pref_label: "instantiated work"
    short_definition: "The concrete execution form of an SOP: PM tasks, FWE runs, and waits created when an SOP fires."
    definition: >
      What an SOP or playbook becomes when it fires: a set of PM containers
      (tasks, assignments) and FWE runs and waits distributed across the
      actors named in the SOP. Cross-actor choreography over hours-to-weeks
      timescales is FWE's job, not a single in-process graph execution.
    related_terms: [operations:sop, operations:run, operations:wait, operations:layer-rule]
    status: draft
    axis: IS
    term_type: structural_concept

  - term_id: run
    canonical_id: operations:run
    canonical_name: "Run"
    pref_label: "run"
    short_definition: "A durable FWE execution record — crash-survivable, carrying idempotency keys, waits, and side effects."
    definition: >
      A persisted execution record (row) in the Work Execution layer (FWE).
      A run survives crashes; it carries idempotency keys, waits, and side
      effects. When an agent is assigned an SOP step, that step executes as
      a run invoking the agent's cognitive-loop graph. Runs make any
      execution — from a single tool call to a multi-day choreography —
      durable.
    related_terms: [operations:instantiated-work, operations:wait, operations:trigger, operations:layer-rule]
    status: draft
    axis: both
    term_type: structural_concept

  - term_id: wait
    canonical_id: operations:wait
    canonical_name: "Wait"
    pref_label: "wait"
    short_definition: "A first-class human-in-the-loop gate on a run, renderable across any surface (Slack, Command, email)."
    definition: >
      A first-class suspension state on a run (run_waits) that gates further
      execution on an external input — typically human approval or action.
      Waits are renderable across any surface: Slack button, Foundry Command,
      email. They are the durability mechanism for human-in-the-loop steps
      inside durable work.
    related_terms: [operations:run, operations:instantiated-work, operations:layer-rule]
    status: draft
    axis: IS
    term_type: lifecycle_state

  - term_id: behavior-subsystem
    canonical_id: operations:behavior-subsystem
    canonical_name: "Behavior (Subsystem)"
    pref_label: "Behavior"
    synonyms: ["agent conduct rulebook", "conduct layer", "behavior subsystem"]
    short_definition: "The governed store of an agent's CONDUCT — the three-tier rulebook (Constitutional / Type pack / Capability pack) that binds by agent type and capability; authored in JOS, run by FAS."
    definition: >
      Behavior (a proper noun; FAS subsystem code `behavior`) is the
      first-class subsystem that holds an agent's CONDUCT — how any agent of a
      given TYPE conducts itself, independent of its job (WORK) or how a work
      item arrived (ORIGIN). Its content is the three-tier Agent Conduct
      Rulebook (JOS-S63): Constitutional (every agent), Type pack (by type,
      inherited), and Capability pack (attaches with a held tool/channel).
      Rules are linked, not copied; precedence is asymmetric with safety
      winning downward; every denial is attributable. JOS defines the rulebook;
      FAS resolves and enforces it. Sibling to Cognition under the Agents system.
    scope_note: >
      Ratified as FAS decision D-216 (2026-07-15); FAS ratified; Tier-0 (18 rules) inserted, JOS-S63
      defines the rulebook doctrine. DISAMBIGUATION (D-216 §6 / R-5): capital-B
      "Behavior" (this subsystem of governed conduct rules) is NOT lowercase
      "behavior" in the ML sense — everything a model does, its whole output
      distribution, the "default behavior is ungoverned behavior" usage in
      VISION and JOS-D0031 / JOS-PB-006. Distinct also from
      operations:standing-order: standing orders are WORK-axis exceptions and
      scoped autonomy grants (D-215) that bound how an agent acts while
      discharging a duty; Behavior is the type-/capability-keyed conduct layer
      that applies regardless of which duty runs. Note two separate
      "constitutional" usages: Behavior's Constitutional TIER is the conduct
      safety-kernel (never fabricate, fail-closed), distinct from
      operations:jos-constitutional-layer (venture-agnostic WORK-axis standing
      orders transmitted from JOS charters).
    related_terms: [operations:standing-order, operations:layer-rule, operations:duty]
    status: draft
    axis: IS
    term_type: structural_concept

  - term_id: trigger
    canonical_id: operations:trigger
    canonical_name: "Trigger"
    pref_label: "trigger"
    synonyms: ["schedule", "trigger/schedule"]
    short_definition: "A FWE scheduler/dispatcher event that fires a graph execution without a human message."
    definition: >
      A FWE scheduler or dispatcher signal (per D-029 proactive invocation)
      that fires a graph execution without a human prompt. Triggers decouple
      the schedule of work from the human interaction that may or may not
      follow. Common forms: cron schedule, batch-complete event, delegation-
      batch wake signal.
    related_terms: [operations:run, operations:layer-rule]
    status: draft
    axis: IS
    term_type: structural_concept

  - term_id: layer-rule
    canonical_id: operations:layer-rule
    canonical_name: "Canon Layer Rule"
    pref_label: "layer rule"
    synonyms: ["FAS layer rule", "canon layer rule"]
    short_definition: "Duties define what an employee owes; standing orders bound how they may act; SOPs choreograph actors; graphs orchestrate calls; loops iterate inside graphs; runs make it all durable."
    definition: >
      The governing design rule reconciling the FAS work layers. Duties
      (operations:duty) define what an agent owes — the org-chart obligation.
      Standing orders (operations:standing-order) bound how an agent may act
      — WORK-axis exceptions and scoped autonomy grants. SOPs (operations:sop)
      choreograph actors at the org/definition layer — cross-actor, durable,
      hours-to-weeks. Graphs (engineering:graph) orchestrate calls at the
      runtime layer — in-process, single-actor, seconds-to-minutes. Loops
      (engineering:loop) iterate inside graphs — model-driven. Runs
      (operations:run) make any layer durable via persisted,
      crash-survivable execution records. An SOP is not a graph; it is the
      definition that spawns many graph executions across many actors.
    scope_note: >
      Locked with Tim, 2026-07-11; sixth clause (standing orders) added
      D-215, 2026-07-14. Source: FAS CLAUDE.md §Canon,
      docs/subsystems/work-definition/README.md, and
      docs/subsystems/agents/cognition/README.md. Promoted to JOS governed
      vocabulary 2026-07-12 (JOS project cf848d96).
    related_terms: [operations:sop, operations:playbook, operations:instantiated-work, operations:run, operations:wait, operations:trigger, operations:standing-order, operations:duty]
    status: draft
    axis: IS
    term_type: governance_mechanic

  # Standing Orders layer (D-215 — locked 2026-07-14)
  - term_id: standing-order
    canonical_id: operations:standing-order
    canonical_name: "Standing Order"
    pref_label: "standing order"
    synonyms: ["agent standing order"]
    short_definition: "A persistent plain-English WORK-axis operating rule (operating conduct) that bounds how an agent may act while discharging any duty."
    definition: >
      A standing order is a persistent plain-English rule of conduct: "when
      X, do Y." Two classes, sharply different in ceremony. Advisory orders
      guide judgment without granting permission (light issuance; active on
      wording confirmation). Autonomy grants pierce a specific gate —
      allowing an act that would otherwise require the principal's approval
      (heavy issuance; machine-evaluable conditions required; separate
      confirmation; TTL by default). Standing orders are the second layer of
      the three-layer model: duty (what you owe) / standing order (how you
      may act) / SOP (mechanical how). Stored in agent_standing_orders;
      never deleted, retired with date/by/reason. The model never
      adjudicates its own fence-hole.
    scope_note: >
      Locked with Tim, 2026-07-14 (D-215). Source: FAS
      WORKBENCH/agent-build/duty-layer/D-215-STANDING-ORDERS-V2.md.
      Distinct from JOS standing_orders[] (charter.yaml, JOS-PB-006 "Guide"
      mode) — JOS venture standing_orders are declared the future
      tenant-scope layer of the D-215 model. Distinct also from
      operations:behavior-subsystem (D-216): standing orders are WORK-axis
      operating conduct — per-duty exceptions and scoped autonomy grants;
      the Behavior subsystem is the type-/capability-keyed conduct layer that
      applies regardless of which duty runs.
    related_terms: [operations:duty, operations:sop, operations:layer-rule, operations:autonomy-grant]
    status: draft
    axis: IS
    term_type: governance_mechanic

  - term_id: autonomy-grant
    canonical_id: operations:autonomy-grant
    canonical_name: "Autonomy Grant"
    pref_label: "autonomy grant"
    synonyms: ["fence-hole", "gate exception", "autonomy-grant order"]
    short_definition: "A standing order that pierces a specific gate, allowing an act that would otherwise require the principal's approval."
    definition: >
      A class of standing order (operations:standing-order) with heavy
      issuance ceremony: requires machine-evaluable conditions generated from
      the principal's prose, rendered back in plain English and confirmed as
      one unit, a named exception target (the duty or gate it excepts), TTL
      (default 90 days), and separate explicit confirmation. The model never
      adjudicates its own fence-hole — conditions are checked by deterministic
      code at the gate. Gate failure always collapses to deny + alert. Grants
      are visible (FC "Fences" card), revocable (retirement is immediate;
      gate re-validates at send time), and time-bounded.
    scope_note: >
      Locked with Tim, 2026-07-14 (D-215). The formal mechanism for
      piercing the R2 outbound gate per-scenario. Hard floors (tenant walls,
      never-fabricate) are not pierceable by any order.
    related_terms: [operations:standing-order, operations:duty, operations:layer-rule]
    status: draft
    axis: IS
    term_type: governance_mechanic

  - term_id: compiled-directive
    canonical_id: operations:compiled-directive
    canonical_name: "Compiled Directive"
    pref_label: "compiled directive"
    synonyms: ["directive block", "injected directive"]
    short_definition: "The LLM-optimized runtime rendering of a standing order's rule_text, hash-bound to the prose version, auto-regenerated on any prose edit."
    definition: >
      The compiled_directive is generated from rule_text (the principal's
      exact words) with intent and context, as a terse imperative suitable
      for injection into agent context. It is never hand-edited; derivation
      is strictly one-directional (rule_text → compiled_directive). It is
      hash-bound to the prose version and auto-regenerated on any prose edit.
      What the agent reads at runtime is the compiled directive; what the
      principal reads and confirms is the rule_text. The display and the
      runtime form are provably consistent.
    scope_note: >
      Locked with Tim, 2026-07-14 (D-215, v2.1 amendment). Compiler
      ownership: pipeline LLM pass at confirmation + orchestrator spot-checks
      during dry-run; Atlas inherits the compile/review role when Atlas ops
      ship.
    related_terms: [operations:standing-order, operations:layer-rule]
    status: draft
    axis: IS
    term_type: governance_mechanic

  - term_id: governance-channel
    canonical_id: operations:governance-channel
    canonical_name: "Governance Channel"
    pref_label: "governance channel"
    synonyms: ["agent-governance", "#agent-governance"]
    short_definition: "The dedicated Slack channel (#agent-governance, C0BH1TAU5U3) where all agent governance items are logged and confirmed."
    definition: >
      #agent-governance (Slack C0BH1TAU5U3, private: Tim + Van + the
      Foundry System bot). The bot is the clerk: every governance item
      (order proposals, autonomy-grant confirmations with warning clause,
      conflict flags, computed rot lists, grant-expiry renewals) posts as
      one bot message; the thread under it is the decision record. A thread
      reply of confirmation from an authorized approver — transport-verified
      against their Slack user ID — IS the signature. Van has full confirm
      authority alongside Tim (revocable by Tim like any order). Operational
      approvals (chase run_waits, DM requests) keep the DM + FC path;
      #agent-governance carries rules-about-behavior only.
    scope_note: >
      Established D-215 v2.2 (locked 2026-07-14). First use: the Van
      confirm-authority order — the first platform-level standing order of
      the D-215 system.
    related_terms: [operations:standing-order, operations:autonomy-grant]
    status: draft
    axis: IS
    term_type: governance_mechanic

  - term_id: jos-constitutional-layer
    canonical_id: operations:jos-constitutional-layer
    canonical_name: "JOS Constitutional Layer"
    pref_label: "JOS constitutional layer"
    synonyms: ["JOS standing orders", "constitutional rules", "platform-scope injected directives"]
    short_definition: "Venture-agnostic WORK-axis standing orders authored in JOS that auto-transmit as platform-scope injected directives for every agent."
    definition: >
      Venture-agnostic WORK-axis standing orders — those that "would survive selling
      every venture" — are authored in JOS standing_orders[] (charter.yaml,
      JOS-PB-006 "Guide" mode) and transmitted down via a sync pipeline that
      compiles JOS constitutional rules into platform-scope injected
      directives for every agent. The JOS file is the single source of truth
      for this layer. Anything naming a venture, person, agent, schedule, or
      channel stays in FAS-operational (actor/duty scope). This resolves the
      naming collision between D-215's agent_standing_orders model and JOS's
      existing standing_orders[] vocabulary: JOS venture standing_orders are
      the top layer of the D-215 model, transmitted down.
    scope_note: >
      Locked with Tim, 2026-07-14 (D-215, v2.1 amendment (b)). Until tenant
      scope ships, the two systems remain disjoint in code; the FAS table is
      named agent_standing_orders to avoid ambiguity.
    related_terms: [operations:standing-order, operations:layer-rule]
    status: draft
    axis: IS
    term_type: governance_mechanic
