  - term_id: sop
    canonical_id: operations:sop
    canonical_name: "Standard Operating Procedure (SOP)"
    pref_label: "SOP"
    short_definition: "A cross-actor procedure definition choreographing humans, agents, and code across a multi-step work unit."
    definition: >
      A named, reusable procedure definition stored in Work-Definition (FWD)
      as data. An SOP choreographs humans, agents, and code across a
      multi-step work unit; it never executes directly — it instantiates into
      PM containers and FWE runs across the named actors. SOPs are the
      definition layer; in-process orchestration (graphs, loops) is not their
      job.
    scope_note: >
      Work-execution sense only (FAS canon, locked 2026-07-11). Distinct from
      the JOS governance delivery-instrument SOP (legacy:jos-sop), which is a
      formal document type.
