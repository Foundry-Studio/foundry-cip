      docs/subsystems/work-definition/README.md, and
      docs/subsystems/agents/cognition/README.md. Promoted to JOS governed
      vocabulary 2026-07-12 (JOS project cf848d96).
    related_terms: [operations:sop, operations:playbook, operations:instantiated-work, operations:run, operations:wait, operations:trigger]
    status: draft
    axis: IS
    term_type: governance_mechanic
