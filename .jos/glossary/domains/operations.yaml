  - term_id: instantiated-work
    canonical_id: operations:instantiated-work
    canonical_name: "Instantiated Work"
    pref_label: "instantiated work"
    short_definition: "The concrete execution form of an SOP: PM tasks, FWE runs, and waits created when an SOP fires."
    definition: >
      What an SOP or playbook becomes when it fires: a set of PM containers
      (tasks, assignments) and FWE runs and waits distributed across the
      actors named in the SOP. Cross-actor choreography over hours-to-weeks
      timescales is FWE's job, not a single in-process graph execution.
    related_terms: [operations:sop, operations:run, operations:wait, operations:layer-rule]
    status: draft
    axis: IS
    term_type: structural_concept

  - term_id: run
    canonical_id: operations:run
    canonical_name: "Run"
    pref_label: "run"
    short_definition: "A durable FWE execution record — crash-survivable, carrying idempotency keys, waits, and side effects."
    definition: >
      A persisted execution record (row) in the Work Execution layer (FWE).
      A run survives crashes; it carries idempotency keys, waits, and side
      effects. When an agent is assigned an SOP step, that step executes as
      a run invoking the agent's cognitive-loop graph. Runs make any
      execution — from a single tool call to a multi-day choreography —
      durable.
    related_terms: [operations:instantiated-work, operations:wait, operations:trigger, operations:layer-rule]
    status: draft
    axis: both
    term_type: structural_concept

  - term_id: wait
    canonical_id: operations:wait
    canonical_name: "Wait"
    pref_label: "wait"
    short_definition: "A first-class human-in-the-loop gate on a run, renderable across any surface (Slack, Command, email)."
    definition: >
      A first-class suspension state on a run (run_waits) that gates further
      execution on an external input — typically human approval or action.
      Waits are renderable across any surface: Slack button, Foundry Command,
      email. They are the durability mechanism for human-in-the-loop steps
      inside durable work.
    related_terms: [operations:run, operations:instantiated-work, operations:layer-rule]
    status: draft
    axis: IS
    term_type: lifecycle_state

  - term_id: trigger
    canonical_id: operations:trigger
    canonical_name: "Trigger"
    pref_label: "trigger"
    synonyms: ["schedule", "trigger/schedule"]
    short_definition: "A FWE scheduler/dispatcher event that fires a graph execution without a human message."
    definition: >
      A FWE scheduler or dispatcher signal (per D-029 proactive invocation)
      that fires a graph execution without a human prompt. Triggers decouple
      the schedule of work from the human interaction that may or may not
      follow. Common forms: cron schedule, batch-complete event, delegation-
      batch wake signal.
    related_terms: [operations:run, operations:layer-rule]
    status: draft
    axis: IS
    term_type: structural_concept

  - term_id: layer-rule
    canonical_id: operations:layer-rule
    canonical_name: "Canon Layer Rule"
    pref_label: "layer rule"
    synonyms: ["FAS layer rule", "canon layer rule"]
    short_definition: "SOPs choreograph actors; graphs orchestrate calls; loops iterate inside graphs; runs make it all durable."
    definition: >
      The governing design rule reconciling the four FAS work-execution
      layers. SOPs (operations:sop) choreograph actors at the org/definition
      layer — cross-actor, durable, hours-to-weeks. Graphs
      (engineering:graph) orchestrate calls at the runtime layer —
      in-process, single-actor, seconds-to-minutes. Loops (engineering:loop)
      iterate inside graphs — model-driven. Runs (operations:run) make any
      layer durable via persisted, crash-survivable execution records. An SOP
      is not a graph; it is the definition that spawns many graph executions
      across many actors.
    scope_note: >
