# JOS Guidance — Per-Instrument Entry Schema v1.0
# Per JOS-SPEC-014 §4. Defines the shape of each entry under a
# domain file's `guidance:` list. Schema-validated by the build
# pipeline (guidance_build.py — to be authored under scope c0981828).
#
# Critical: entries are METADATA about existing instrument files.
# The instrument file remains source of truth for content. This
# manifest enumerates + tags so agents can discover.

schema_version: "1.0"
schema_name: jos-guidance-entry
description: >
  Each entry catalogs one existing guidance instrument with enough
  metadata for the flat-index agent lookup, the per-domain rendered
  views, and the validation pass that confirms every entry resolves
  to a registry instrument.

fields:
  canonical_id:
    type: string
    required: true
    description: >
      Existing instrument's canonical ID (e.g., JOS-METHOD-DOMAIN-ENGINEERING,
      JOS-P15, JOS-C20, JOS-BP-001, JOS-PB-003, JOS-GD-002).
    validation:
      must_resolve_in_registry: true

  uuid:
    type: string
    required: true
    format: uuid-v4
    description: Instrument's UUID (must match the registry + instrument frontmatter).
    validation:
      must_match_instrument_uuid: true

  type:
    type: string
    required: true
    enum:
      - principle
      - concept
      - method
      - framework
      - playbook
      - guide
      - best-practice
      - suggested-standard
      - glossary-term

  domain:
    type: string
    required: true
    enum: [core, meta, engineering, documentation, data, finance,
           strategy, operations, people, legal, business]
    description: >
      One of the 10 JOS-S31 governance domains + core. Must match the
      module's `prefix:` if entry lives in a per-domain file (core
      entries can live in core.yaml regardless of instrument's authored
      domain).

  title:
    type: string
    required: true
    description: Instrument's title (carried from frontmatter for quick scan).

  short_summary:
    type: string
    required: true
    max_chars: 300
    description: >
      One sentence — what this instrument helps with. Distinct from
      solve_for (which describes a problem); this is "use this when".

  applicable_when:
    type: list
    item_type: string
    required: true
    min_items: 0
    description: >
      Canonical tags from `_tag-vocabulary.yaml`. An empty list is
      ALLOWED for v1.0 (signals "applies broadly, no specific cue")
      but a warning is raised — every guidance entry should ideally
      have at least one trigger tag. v2.0 will make this required.

  path:
    type: string
    required: true
    description: Repo-relative path to the instrument file.

  flexibility:
    type: string
    required: false
    enum: [required, expected, suggested]
    description: >
      Carried from instrument's frontmatter where present. For
      principles/concepts/methods this is the authoring flexibility;
      for best-practices and concepts it may be absent.

  related_guidance:
    type: list
    item_type: string
    required: false
    description: >
      Other guidance entries (by canonical_id) to consult alongside.
      Build validates that each reference resolves.

  related_governance:
    type: list
    item_type: string
    required: false
    description: >
      Rules / required-standards that apply when consulting this
      guidance. Helps agents see both lenses for the same situation.

  added:
    type: string
    required: true
    format: date
    description: When this entry was added to the manifest.

  last_reviewed:
    type: string
    required: false
    format: date
    description: When this entry was last reviewed for accuracy.

validation_rules:
  - id: GE-001
    rule: canonical_id MUST exist in .jos/registry.yaml
    severity: blocking
  - id: GE-002
    rule: uuid MUST match the instrument's frontmatter uuid
    severity: blocking
  - id: GE-003
    rule: every tag in applicable_when MUST exist in _tag-vocabulary.yaml
    severity: blocking
  - id: GE-004
    rule: every entry in related_guidance MUST resolve to a registered guidance entry
    severity: warning
  - id: GE-005
    rule: per-domain file entries MUST have domain matching the module's prefix
    severity: blocking
  - id: GE-006
    rule: applicable_when SHOULD be non-empty (v1.0 warning, v2.0 blocking)
    severity: warning
