# foundry-cip Alembic configuration

[alembic]
# v3 (Round-2 Q1 fix): script_location uses package-qualified path so the
# migrations resolve correctly when foundry-cip is installed as a wheel.
# Alembic 1.8+ resolves `package:subdir` natively via importlib.import_module —
# no custom importlib.resources plumbing needed.
script_location = cip:migrations
prepend_sys_path = .
version_path_separator = os
output_encoding = utf-8

# DATABASE_URL is read from environment in env.py — not hardcoded here.
# Set DATABASE_URL=postgresql+psycopg://user:pw@host:5432/db

# foundry-cip uses a custom version table per D-146 (separate from monorepo's
# default `alembic_version`) so the two repos can coexist in the shared
# Foundry Postgres without chain conflicts. The version_table is set in
# cip/migrations/env.py (NOT here) because env.py reads DATABASE_URL at runtime.
#
# Cross-pollution guard (Round-2 Q3 fix): cip/migrations/env.py refuses to run
# if the target DB has the default `alembic_version` table populated with
# revisions not matching the cip_* prefix. Override via FOUNDRY_CIP_ALLOW_CROSS_CHAIN=1.

[post_write_hooks]
# (none for now; ruff format could go here later)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
