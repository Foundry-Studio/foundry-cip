components:

  # ─── Connector framework primitives (delivers: connector-framework feature) ──

  - component_id: cip-connector-protocol
    type: service
    title: CIPConnector + CIPMapper Protocols
    summary: The Protocol-based contract every CIP connector implements.
    description: |
      Two typing.Protocol classes defining the contract every CIP connector must satisfy:
      CIPConnector.stream_records() (incremental sync) + CIPMapper.map() (translate to cip_*
      schema) + optional CIPConnectorBase.backfill_history() per D-159. Protocol-based per
      D-134 to avoid base-class inheritance constraints.
    status: shipped
    maturity: silver
    created: 2026-04-30
    last_modified: 2026-05-14
    shipped_date: 2026-04-30
    owner: tim
    domain: eng
    container:
      thing_id: foundry-cip-ingestion-and-connectors
    code_path: cip.integration_mesh.base
    interface_surface:
      - type: internal
        module: cip.integration_mesh.base
    visibility: public-in-portfolio
    tags: [protocol, contract, framework-primitive]
    relations:
      delivers_features: [connector-framework]
    governance_refs:
      - id: D-134
        relationship: implements
      - id: D-159
        relationship: implements

  - component_id: cip-sync-orchestrator
    type: service
    title: Sync Orchestrator (run_sync / run_backfill)
    summary: Top-level orchestrator wrapping connector + mapper with advisory-lock dual-run prevention.
    description: |
      Functions run_sync() and run_backfill() that take a connector + mapper, wrap them with
      session-level Postgres advisory locks to prevent dual-running for the same tenant,
      and drive the batched-commit pipeline through CIPRowPersister.
    status: shipped
    maturity: silver
    created: 2026-04-30
    last_modified: 2026-05-13
    shipped_date: 2026-04-30
    owner: tim
    domain: eng
    container:
      thing_id: foundry-cip-ingestion-and-connectors
    code_path: cip.integration_mesh.orchestrator
    interface_surface:
      - type: internal
        module: cip.integration_mesh.orchestrator
    visibility: public-in-portfolio
    tags: [orchestrator, framework-primitive]
    relations:
      delivers_features: [connector-framework, historical-backfill]
      uses_components: [cip-connector-protocol, cip-row-persister]

  - component_id: cip-row-persister
    type: service
    title: CIPRowPersister
    summary: Schema-aware Postgres writer with SCD-2 history + property-registry integration.
    description: |
      Writes connector-yielded rows into cip_* tables. Owns the SCD-2 history-row generation
      (paired with cip-scd-differ for change detection), the 9 provenance columns, and the
      property-registry lookup that maps connector field names → SQL columns vs JSONB overflow.
      persist_history_record() handles D-159 backfill rows that bypass SCD differ.
    status: shipped
    maturity: silver
    created: 2026-04-30
    last_modified: 2026-05-14
    shipped_date: 2026-04-30
    owner: tim
    domain: eng
    container:
      thing_id: foundry-cip-ingestion-and-connectors
    code_path: cip.integration_mesh.persister
    interface_surface:
      - type: internal
        module: cip.integration_mesh.persister
    visibility: public-in-portfolio
    tags: [persister, scd-2, framework-primitive]
    relations:
      delivers_features: [connector-framework, property-registry, scd-history]
      uses_components: [cip-scd-differ, cip-tenant-context]
    governance_refs:
      - id: D-135
        relationship: implements
        note: "App-layer SCD Type 2"

  - component_id: cip-scd-differ
    type: service
    title: SCD-2 Differ
    summary: Diffs incoming rows vs existing to determine which create *_history rows.
    description: |
      Bitemporal SCD-2 history generator. Compares each incoming connector row against the
      latest cip_* table row for the same source_id; on detected change, closes the prior
      version (sets valid_to) + writes a new active row + writes the prior row's snapshot
      to the corresponding *_history table.
    status: shipped
    maturity: gold
    created: 2026-04-30
    last_modified: 2026-05-09
    shipped_date: 2026-04-30
    owner: tim
    domain: eng
    container:
      thing_id: foundry-cip-ingestion-and-connectors
    code_path: cip.integration_mesh.scd_differ
    interface_surface:
      - type: internal
        module: cip.integration_mesh.scd_differ
    visibility: public-in-portfolio
    tags: [scd-2, history, framework-primitive]
    relations:
      delivers_features: [scd-history]
    governance_refs:
      - id: D-135
        relationship: implements

  - component_id: cip-tenant-context
    type: service
    title: Tenant Context (SET LOCAL middleware)
    summary: Postgres SET LOCAL app.current_tenant context manager keying RLS policies.
    description: |
      Sets the app.current_tenant GUC for the current Postgres session via context manager.
      Every cip_* table's RLS policy keys on this GUC; the explicit tenant_id predicates in
      lens views provide defense-in-depth. Used by orchestrator on every batch.
    status: shipped
    maturity: gold
    created: 2026-04-17
    last_modified: 2026-04-30
    shipped_date: 2026-04-17
    owner: tim
    domain: eng
    container:
