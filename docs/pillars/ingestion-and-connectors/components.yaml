  - component_id: cip-fixture-connector
    type: connector
    title: FixtureConnector
    summary: Deterministic synthetic-data connector producing 1150 rows from a fixed Faker seed.
    description: |
      Reference CIPConnector implementation that needs no external API. Generates
      ~50 companies / ~200 contacts / ~300 deals / ~500 tickets / ~100 documents /
      ~50 notes from one fixed random seed. Pinned to Python 3.12 + PYTHONHASHSEED=0
      for byte-identical reproducibility (golden-file snapshot harness enforces).
