  # ─── Historical backfill (D-159) ──

  - component_id: cip-historical-record
    type: service
    title: HistoricalRecord dataclass
    summary: Immutable dataclass representing one historical snapshot from a connector backfill.
    description: |
      Carries target_table, source_id, valid_from, valid_to, fields, overflow, changed_by,
      change_reason. Connector backfill_history() methods yield these; persister writes them
      directly to *_history tables bypassing the SCD differ (backfill records are known-
      historical, not detected-changes).
    status: shipped
    maturity: silver
    created: 2026-05-13
