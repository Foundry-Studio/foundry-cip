  - component_id: cip-hubspot-connector
    type: connector
    title: HubSpotConnector
    summary: HubSpot CRM v3 connector — companies/contacts/deals/tickets + property-history backfill.
    description: |
      Implements CIPConnector + CIPMapper against HubSpot v3 API. stream_records() pulls
      companies/contacts/deals/tickets via incremental sync; backfill_history() re-paginates
