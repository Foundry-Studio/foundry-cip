  - component_id: cip-scheduled-sync
    type: scheduled-task-host
    title: Scheduled CIP sync (FAS-hosted)
    summary: >
      Three FAS SYSTEM_SCHEDULES (cip_wayward_hubspot, cip_wayward_zendesk,
      cip_ps_lens_mirror) wire CIP ingestion + EC→PS LensMirror onto an
      hourly cadence. Wrapper lives in Foundry-Agent-System at
      src/work_execution/producers/scheduled_tasks/cip_sync.py;
      CIP-domain orchestration in cip.integration_mesh.run_sync +
      cip.integration_mesh.sync.ps_lens_mirror. Productizes
      VISION.md L271 "scheduled-sync worker / push-and-sync pillar".
    status: shipped
    maturity: bronze
