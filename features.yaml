  # ─── Pillar 4: Lens Engine ───────────────────────────────────────────
  - feature_id: lens-engine
    title: Lens Engine (P-21 Multi-Lens by Default)
    summary: Query-time predicate compilation from cip_views.filter_config JSONB → SQLAlchemy WHERE clause; AND-composes with tenant RLS.
    description: |
      Equality-only v1; operator extensibility deferred to v2. Every data surface assumes
      N consumers with N filter configs per P-21 — added a new lens by INSERT-only into cip_views.
    status: shipped
    maturity: silver
    created: 2026-04-30
    last_modified: 2026-05-09
    shipped_date: 2026-04-30
    owner: tim
    domain: eng
    tags: [pillar:lens-engine]
