features:
  # ─── Pillar 1: Ingestion & Connectors ────────────────────────────────
  - feature_id: connector-framework
    title: Generic Connector Framework
    summary: CIPConnector + CIPMapper Protocols + sync orchestrator with session-level advisory locks.
    description: |
      Protocol-based framework letting any external source (HubSpot, Zendesk, Plaid, etc.) plug in
      by implementing CIPConnector.stream_records() + CIPMapper.map() + optional backfill_history().
      Dual-run prevention via advisory locks; bug-bashed 2026-05-14.
    status: shipped
    maturity: silver
    created: 2026-04-30
    last_modified: 2026-05-14
    shipped_date: 2026-04-30
    owner: tim
    domain: eng
    tags: [pillar:ingestion-and-connectors]
    interface_surface:
      - type: internal
        module: cip.integration_mesh.orchestrator
    references:
      - id: D-134
        relationship: implements
        note: "Protocol-based connector framework"

  - feature_id: fixture-connector
    title: Fixture (Deterministic Synthetic) Connector
    summary: Reference connector producing 1150 rows from a fixed Faker seed for byte-identical reproducibility.
    description: |
      No external API. Generates ~50 companies / ~200 contacts / ~300 deals / ~500 tickets /
      ~100 documents / ~50 notes from one fixed random seed. Pinned to Python 3.12 + PYTHONHASHSEED=0.
    status: shipped
    maturity: gold
    created: 2026-04-30
    last_modified: 2026-05-09
    shipped_date: 2026-04-30
    owner: tim
    domain: eng
    tags: [pillar:ingestion-and-connectors, exemplar]
    interface_surface:
      - type: internal
        module: cip.integration_mesh.connectors.fixture.connector

  - feature_id: hubspot-connector
    title: HubSpot CRM Connector
    summary: HubSpot v3 connector — companies/contacts/deals/tickets + mandatory property-history backfill per D-159.
    description: |
      Implementation landed 2026-05-12. Bug-bashed 2026-05-14 (schema-drift class). Awaits
      Tim's "go" for first real-tenant Wayward ingestion. HubSpot retains only 20 property
      revisions — Phase 2 begins history capture from first sync (delay = permanent loss).
    status: shipped
    maturity: silver
    created: 2026-05-09
    last_modified: 2026-05-14
    shipped_date: 2026-05-12
    owner: tim
    domain: eng
    tags: [pillar:ingestion-and-connectors]
    interface_surface:
      - type: internal
        module: cip.integration_mesh.connectors.hubspot.connector

  - feature_id: zendesk-connector
    title: Zendesk Connector
    summary: Zendesk Support v2 — orgs/users/tickets + mandatory ticket-audit history backfill per D-159.
    description: |
      Implementation landed 2026-05-12. Cursor-pagination fix 2026-05-14 (legacy next_page chain
      was looping infinitely on Wayward 100-org corpus). Awaits Tim's "go" for first real-tenant
      ingestion.
    status: shipped
    maturity: silver
    created: 2026-05-09
    last_modified: 2026-05-14
    shipped_date: 2026-05-12
    owner: tim
    domain: eng
    tags: [pillar:ingestion-and-connectors]
    interface_surface:
      - type: internal
        module: cip.integration_mesh.connectors.zendesk.connector

  - feature_id: plaid-connector
    title: Plaid Financial Connector
    summary: Per-tenant financial ingestion — accounts, transactions, balances (replaces earlier QBO plan).
    status: planned
    maturity: bronze
    created: 2026-05-09
    last_modified: 2026-05-21
    owner: tim
    domain: eng
    tags: [pillar:ingestion-and-connectors]
    references:
      - id: connector-framework
        relationship: derives-from

  - feature_id: historical-backfill
    title: Mandatory Historical Backfill (D-159)
    summary: Every connector pulls source history on first sync and writes synthesized cip_*_history rows.
    description: |
      HubSpot Property History, Zendesk audit log, etc. — preserved per source's retention window.
      Codified in CONNECTOR-AUTHORING-GUIDE.md §13.
    status: shipped
    maturity: silver
    created: 2026-05-12
    last_modified: 2026-05-13
    shipped_date: 2026-05-13
    owner: tim
    domain: eng
    tags: [pillar:ingestion-and-connectors, cross-cutting]
    interface_surface:
      - type: internal
        module: cip.integration_mesh.base.HistoricalRecord
    references:
      - id: D-159
        relationship: implements

  - feature_id: connector-conformance-harness
    title: Connector Conformance Test Suite
    summary: 8-test harness validating any CIPConnector against framework contracts.
    description: |
      Protocol shape, incremental sync, property registry, SCD history, sync run audit,
      tenant scoping, post-commit RLS isolation, concurrent-sync advisory lock.
      Every future CIPConnector runs this harness before its migration lands.
    status: shipped
    maturity: gold
    created: 2026-04-30
    last_modified: 2026-05-12
    shipped_date: 2026-04-30
    owner: tim
    domain: eng
    tags: [pillar:ingestion-and-connectors, governance]
    interface_surface:
      - type: internal
        module: tests.fixtures.connector_conformance

